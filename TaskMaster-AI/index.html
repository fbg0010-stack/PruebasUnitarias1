<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lista de Tareas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gestor de Tareas</h1>
        <p>Proyecto para la evaluación del Módulo 20</p>
        
        <div class="input-group">
            <input type="text" id="nueva-tarea" placeholder="Escribe una tarea...">
            <button id="btn-agregar">Añadir</button>
        </div>

        <ul id="lista-tareas">
            <!-- Las tareas se verán aquí -->
        </ul>

        <div class="stats">
            <span id="contador">Tareas pendientes: 0</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
